<!DOCTYPE html>
<html>
<head>
<title>Caitlyn ❤️</title>

<style>
body{
background:#ffe6f0;
font-family:Arial;
text-align:center;
}

h1{
color:#ff4d88;
}

button{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
background:#ff80aa;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff4d88;
}

img{
max-width:300px;
margin-top:20px;
border-radius:10px;
}

.heart{
position:fixed;
color:#ff4d88;
font-size:20px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

#secretBtn{
position:fixed;
bottom:10px;
right:10px;
opacity:0.1;
font-size:10px;
}

</style>
</head>

<body>

<h1>Welcome Caitlyn ❤️</h1>

<p>This little website is just for you.</p>

<button onclick="loveClick()">I love you</button>

<p id="goodgirl"></p>

<button onclick="level2()">Welcome to Level 2</button>

<br>

<button onclick="showCounter()">Time Counter</button>

<p id="counterText"></p>

<div id="counter"></div>

<br>

<button onclick="finalPage()">Final Page</button>

<div id="final"></div>

<br>

<button id="secretBtn" onclick="secret()">secret</button>

<div id="secretBox"></div>

<div id="level2box"></div>

<script>

let loveCount=0;

function loveClick(){
loveCount++;

if(loveCount>=10){
document.getElementById("goodgirl").innerHTML="Good girl ❤️";
}
}

function level2(){
document.getElementById("level2box").innerHTML=`
<h2>Welcome to Level 2</h2>

<button onclick="showMe()">Click to see something cute</button>

<div id="meBox"></div>

<br>

<button onclick="driving()">Click if you passed your driving test</button>

<div id="driveBox"></div>
`;
}

function showMe(){
document.getElementById("meBox").innerHTML=`
<p>You mean the world to me.</p>
<img src="ME.png">
`;
}

function driving(){
document.getElementById("driveBox").innerHTML=`
<h3>Good job!!! I'm proud of you ❤️</h3>
<img src="drivinggf.png">
`;
}

function showCounter(){

document.getElementById("counterText").innerHTML="Best moment of my life, January 8th, 2026, 10:53 p.m.";

const startDate=new Date("Jan 8 2026 22:53:00").getTime();

setInterval(function(){

const now=new Date().getTime();
const distance=now-startDate;

let days=Math.floor(distance/(1000*60*60*24));
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes=Math.floor((distance%(1000*60*60))/(1000*60));
let seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("counter").innerHTML=
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds ❤️";

},1000);

}

function finalPage(){
document.getElementById("final").innerHTML=`
<h1>I love you more than anything</h1>

<p>
I know this little project isn't something huge,
but I really wanted to make it for you.

You make my life so much better and I can't wait
to create so many more memories with you.

I love you like crazy and I want to spend my life with you.
</p>
`;
}

function secret(){
document.getElementById("secretBox").innerHTML=`
<h3>Freshly Pressed Orange Juice</h3>
<img src="freshlypressed.png">
`;
}

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);

}

setInterval(createHeart,800);

</script>

</body>
</html>
